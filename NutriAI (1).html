// ─── CALCULATION ENGINE ───────────────────────────────────────────────────────
function calcPlan(p) {
  const w = parseFloat(p.weight)||75, h = parseFloat(p.height)||170, a = parseInt(p.age)||25;
  const bmr = p.gender==="female"
    ? 447.6 + (9.2*w) + (3.1*h) - (4.3*a)
    : 88.36 + (13.4*w) + (4.8*h) - (5.7*a);
  const mult = {sed:1.2,light:1.375,active:1.55,very:1.725}[p.activity]||1.55;
  const tdee = Math.round(bmr * mult);
  const goalAdj = {lose:-500,muscle:+300,maintain:0,perform:+200}[p.goal]||0;
  const calGoal = Math.max(1200, tdee + goalAdj);
  const bmi = w / ((h/100)**2);
  const idealMin = 18.5 * (h/100)**2, idealMax = 24.9 * (h/100)**2;
  const bmiLabel = bmi<18.5?"thin":bmi<25?"normal":bmi<30?"over":"obese";

  // Macro split by diet type
  const splits = {
    balanced:{p:0.30,c:0.45,f:0.25},
    highp:{p:0.40,c:0.35,f:0.25},
    lowc:{p:0.35,c:0.20,f:0.45},
    keto:{p:0.25,c:0.05,f:0.70},
    med:{p:0.20,c:0.50,f:0.30},
  };
  const split = splits[p.diet]||splits.balanced;
  const protein = Math.round((calGoal * split.p)/4);
  const carbs   = Math.round((calGoal * split.c)/4);
  const fat     = Math.round((calGoal * split.f)/9);

  const waterGoal = Math.max(2, (w*0.033 + (p.activity==="very"?0.7:p.activity==="active"?0.5:0.2)));
  const weightDiff = Math.abs(w - (idealMin+idealMax)/2);
  const weeksEst   = p.goal==="maintain"?0:Math.round(weightDiff/(goalAdj<0?0.5:0.3));

  return {
    bmr:Math.round(bmr), tdee, calGoal, protein, carbs, fat,
    waterGoal:Math.round(waterGoal*10)/10,
    bmi:Math.round(bmi*10)/10, bmiLabel,
    idealWeight:`${Math.round(idealMin)}-${Math.round(idealMax)} kg`,
    weeksEst,
  };
}

// ─── AI MEAL PLAN GENERATOR (via Anthropic API) ───────────────────────────────
async function generateAIMealPlan(profile, plan, lang) {
  const isAr = lang==="ar";
  const prompt = isAr
    ? `أنت خبير تغذية. بناءً على هذه البيانات الشخصية:
- الاسم: ${profile.name}
- العمر: ${profile.age} سنة، الجنس: ${profile.gender==="male"?"ذكر":"أنثى"}
- الوزن: ${profile.weight}كج، الطول: ${profile.height}سم
- الهدف: ${profile.goal}، النشاط: ${profile.activity}
- نوع الغذاء: ${profile.diet}
- هدف السعرات: ${plan.calGoal} سعرة يومياً
- البروتين: ${plan.protein}ج، الكربوهيدرات: ${plan.carbs}ج، الدهون: ${plan.fat}ج
- حساسية: ${profile.allergies}، حالة صحية: ${profile.health}

اصنع خطة وجبات ليوم واحد مناسبة ثقافياً للمنطقة العربية بالعربية فقط.
أجب بـ JSON فقط بدون أي نص إضافي بهذا الشكل بالضبط:
{"breakfast":{"name":"اسم الوجبة","items":["عنصر 1","عنصر 2"],"calories":400,"protein":30,"carbs":45,"fat":10,"emoji":"🍳"},"lunch":{"name":"اسم الوجبة","items":["عنصر 1","عنصر 2"],"calories":550,"protein":40,"carbs":55,"fat":15,"emoji":"🍚"},"dinner":{"name":"اسم الوجبة","items":["عنصر 1","عنصر 2"],"calories":500,"protein":35,"carbs":50,"fat":14,"emoji":"🍲"},"snack":{"name":"اسم الوجبة","items":["عنصر 1"],"calories":200,"protein":10,"carbs":25,"fat":5,"emoji":"🍎"},"tips":["نصيحة 1","نصيحة 2","نصيحة 3"]}`
    : `You are a certified nutritionist. Based on this profile:
- Name: ${profile.name}, Age: ${profile.age}, Gender: ${profile.gender}
- Weight: ${profile.weight}kg, Height: ${profile.height}cm
- Goal: ${profile.goal}, Activity: ${profile.activity}
- Diet type: ${profile.diet}
- Daily calorie goal: ${plan.calGoal} kcal
- Protein: ${plan.protein}g, Carbs: ${plan.carbs}g, Fat: ${plan.fat}g
- Allergies: ${profile.allergies}, Health: ${profile.health}

Create a realistic one-day meal plan. Reply with JSON ONLY, no extra text:
{"breakfast":{"name":"meal name","items":["item1","item2"],"calories":400,"protein":30,"carbs":45,"fat":10,"emoji":"🍳"},"lunch":{"name":"meal name","items":["item1","item2"],"calories":550,"protein":40,"carbs":55,"fat":15,"emoji":"🥗"},"dinner":{"name":"meal name","items":["item1","item2"],"calories":500,"protein":35,"carbs":50,"fat":14,"emoji":"🍽️"},"snack":{"name":"meal name","items":["item1"],"calories":200,"protein":10,"carbs":25,"fat":5,"emoji":"🍎"},"tips":["tip1","tip2","tip3"]}`;

  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}]
    })
  });
  const data = await res.json();
  const text = data.content?.find(b=>b.type==="text")?.text||"{}";
  const clean = text.replace(/```json|```/g,"").trim();
  return JSON.parse(clean);
}

  const logFood=(food,qty=1,meal=selectedMeal)=>{

  // ─── CALORIE RING ──────────────────────────────────────────────────────────────
  const CalRing=({val,goal,size=148,stroke=11})=>{
    const r=(size-stroke)/2,c=2*Math.PI*r,p=Math.min(1,val/goal);
    const ov=val>goal;
    return(
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <defs>
          <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={ov?C.red:C.accent}/><stop offset="100%" stopColor={ov?C.red:"#81C784"}/>
          </linearGradient>
        </defs>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.surf2} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="url(#rg)" strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={`${p*c} ${c}`}
          style={{transition:"stroke-dasharray 1s cubic-bezier(.16,1,.3,1)"}}/>
      </svg>
    );

        <div style={{height:"100%",width:`${pct(val,goal)}%`,background:color,borderRadius:3,transition:"width .8s cubic-bezier(.16,1,.3,1)"}}/>

  const FoodItem=({food,showAdd=true})=>(

  // ════════════════════════════════════════════════════════════════

  // ════════════════════════════════════════════════════════════════
  // SCREEN: MAIN APP
  // ════════════════════════════════════════════════════════════════
  const insight = AI_INSIGHTS[insightIdx];
  const WEEK_CAL_FINAL = [1820,2150,1680,1950,2200,1750,Math.max(200,Math.round(totalCal))];

  const HomeTab=()=>(
    <div style={{padding:"0 16px 100px",animation:"fadeUp .4s ease"}}>
      <div style={{padding:"52px 0 18px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:13,color:C.muted,fontWeight:500}}>{greeting} 👋</div>

          <button onClick={()=>setModal("settings")} style={{width:40,height:40,borderRadius:12,background:C.surf,border:`1px solid ${C.border}`,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙️</button>

            <div key={r.l} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:12,color:C.muted}}>{r.l}</span>

  const FoodDetailModal=()=>{
    if(!detailFood)return null;
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:600,display:"flex",alignItems:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)setModal("search");}}>
        <div style={{width:"100%",maxWidth:430,margin:"0 auto",background:C.surf,borderRadius:"24px 24px 0 0",padding:"24px 20px 48px",animation:"slideUp .3s cubic-bezier(.16,1,.3,1)"}}>
          <div style={{width:40,height:4,background:C.border,borderRadius:2,margin:"0 auto 20px"}}/>
          <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:20}}>
            <div style={{width:60,height:60,borderRadius:16,background:C.accentBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34}}>{detailFood.emoji}</div>
            <div><div style={{fontSize:17,fontWeight:800}}>{foodName(detailFood)}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{detailFood.srv}</div></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:20}}>
            {[{l:t.calories,v:Math.round(detailFood.cal*detailQty),u:"kcal",c:C.accent},{l:t.protein,v:Math.round(detailFood.p*detailQty*10)/10,u:"g",c:C.accent2},{l:t.carbs,v:Math.round(detailFood.c*detailQty*10)/10,u:"g",c:C.gold},{l:t.fat,v:Math.round(detailFood.f*detailQty*10)/10,u:"g",c:"#9C27B0"}].map(n=>(
              <div key={n.l} style={{background:C.surf2,borderRadius:10,padding:"12px 6px",textAlign:"center"}}>
                <div style={{fontSize:17,fontWeight:800,color:n.c}}>{n.v}</div><div style={{fontSize:9,color:C.muted}}>{n.u}</div><div style={{fontSize:9,color:C.muted,marginTop:2}}>{n.l}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,marginBottom:20}}>
            <button onClick={()=>setDetailQty(q=>Math.max(0.5,q-0.5))} style={{width:42,height:42,borderRadius:"50%",border:`1px solid ${C.border}`,background:C.surf2,fontSize:22,cursor:"pointer",color:C.text}}>−</button>
            <div style={{textAlign:"center"}}><div style={{fontSize:24,fontWeight:800}}>{detailQty}</div><div style={{fontSize:11,color:C.muted}}>{t.serving}</div></div>
            <button onClick={()=>setDetailQty(q=>q+0.5)} style={{width:42,height:42,borderRadius:"50%",background:C.accent,border:"none",fontSize:22,cursor:"pointer",color:"#fff"}}>+</button>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {["breakfast","lunch","dinner","snacks"].map(m=>(
              <button key={m} onClick={()=>setSelectedMeal(m)} style={{flex:1,padding:"7px 3px",borderRadius:10,border:`1px solid ${selectedMeal===m?C.accent:C.border}`,background:selectedMeal===m?C.accentBg:"transparent",cursor:"pointer",fontSize:9,fontWeight:600,color:selectedMeal===m?C.accent:C.muted}}>
                {{breakfast:"🌅",lunch:"☀️",dinner:"🌙",snacks:"🍎"}[m]}<br/>{t[m]}
              </button>
            ))}
          </div>
          <button onClick={()=>logFood(detailFood,detailQty)} style={btn()}>+ {t.add}</button>
        </div>
      </div>
    );
  };

  const SettingsModal=()=>(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:500,display:"flex",alignItems:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
      <div style={{width:"100%",maxWidth:430,margin:"0 auto",background:C.surf,borderRadius:"24px 24px 0 0",padding:"24px 20px 48px",animation:"slideUp .3s cubic-bezier(.16,1,.3,1)"}}>
        <div style={{width:40,height:4,background:C.border,borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{fontSize:18,fontWeight:700,marginBottom:24}}>⚙️ {t.settings}</div>
        {[{label:t.language,options:[{v:"ar",l:"🇪🇬 العربية"},{v:"en",l:"🇺🇸 English"}],cur:lang,set:setLang},{label:t.theme,options:[{v:"light",l:"☀️ Light"},{v:"dark",l:"🌙 Dark"}],cur:theme,set:setTheme}].map(g=>(
          <div key={g.label} style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>{g.label}</div>
            <div style={{display:"flex",gap:8}}>
              {g.options.map(o=>(
                <button key={o.v} onClick={()=>g.set(o.v)} style={{padding:"10px 18px",borderRadius:12,cursor:"pointer",border:`2px solid ${g.cur===o.v?C.accent:C.border}`,background:g.cur===o.v?C.accentBg:"transparent",color:g.cur===o.v?C.accent:C.muted,fontWeight:600,fontSize:13}}>{o.l}</button>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  const navItems=[{id:"home",icon:"🏠",label:t.home},{id:"diary",icon:"📔",label:t.diary},{id:"coach",icon:"🤖",label:t.coach},{id:"plans",icon:"📋",label:t.plans},{id:"profile",icon:"👤",label:t.profile}];

  return(
    <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",background:C.bg,color:C.text,minHeight:"100vh",maxWidth:430,margin:"0 auto",position:"relative",overflow:"hidden",direction:isRTL?"rtl":"ltr"}}>
      <style>{css}</style>
      <div style={{height:"100vh",overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch"}}>
        {tab==="home"&&<HomeTab/>}
        {tab==="diary"&&<DiaryTab/>}
        {tab==="coach"&&<CoachTab/>}
        {tab==="plans"&&<PlansTab/>}
        {tab==="profile"&&<ProfileTab/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.nav,borderTop:`1px solid ${C.border}`,display:"flex",padding:"8px 0 20px",backdropFilter:"blur(20px)",zIndex:200}}>
        {navItems.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"6px 4px",background:"none",border:"none",cursor:"pointer",color:tab===n.id?C.accent:C.muted,transition:"color .15s"}}>
            <span style={{fontSize:21}}>{n.icon}</span>
            <span style={{fontSize:9,fontWeight:tab===n.id?700:500}}>{n.label}</span>
            {tab===n.id&&<div style={{width:4,height:4,borderRadius:"50%",background:C.accent,marginTop:1}}/>}
          </button>
        ))}
      </div>
      {modal==="camera"&&<CameraModal/>}
      {modal==="voice"&&<VoiceModal/>}
      {modal==="search"&&<SearchModal/>}
      {modal==="foodDetail"&&<FoodDetailModal/>}
      {modal==="settings"&&<SettingsModal/>}
    </div>
  );
}

    // Mount app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));

    // Hide loading screen
    setTimeout(() => {
      const loader = document.getElementById('loading');
      if(loader){ loader.classList.add('hide'); setTimeout(()=>loader.remove(),600); }
    }, 800);

  </script>

  <!-- Service Worker for offline support -->
  <script>
    if('serviceWorker' in navigator){
      const swCode = `
        const CACHE = 'nutriai-v1';
        const URLS = [location.href];
        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS))));
        self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
      `;
      const blob = new Blob([swCode], {type:'application/javascript'});
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(()=>{});
    }
  </script>
</body>
</html>
